# 실험 — Alpha360 + GRU, S&P500 전체 (qlib 벤치마크 리더 방식의 미국 재판정)
#
# qlib 공식 벤치마크(중국 CSI300)에서 Alpha360+시퀀스모델(GRU/HIST 등)이 Alpha158+GBDT보다
# Rank IC 높음(예: HIST 0.067 vs LightGBM ~0.04). 이를 미국 대형주에 적용해 "모델이 아니라
# 시장이 천장"인지 실측한다. 베이스라인(alpha158_lgb_sp500)과 라벨·주간스텝·비용·세그먼트를
# 동일하게 두고 handler(Alpha158→Alpha360)·model(LGB→GRU)만 교체 = 공정 비교.
#
# HIST/IGMTF는 종목 컨셉그래프(중국 특화)가 필요해 미국 이식 부적합 → 그래프 불필요한 GRU 채택.

qlib_init:
  provider_uri: data/qlib_us
  region: us

market: sp500
benchmark: SPY

data_handler_config: &data_handler_config
  start_time: 2015-01-02
  end_time: 2026-07-16
  fit_start_time: 2015-01-02
  fit_end_time: 2021-06-30
  instruments: sp500
  label: [["Ref($close, -6)/Ref($close, -1) - 1"], ["LABEL0"]]   # 베이스라인과 동일(주간 5일 fwd)
  infer_processors:
    - class: RobustZScoreNorm
      kwargs: {fields_group: feature, clip_outlier: true}
    - class: Fillna
      kwargs: {fields_group: feature}
  learn_processors:
    - class: DropnaLabel
    - class: CSRankNorm
      kwargs: {fields_group: label}

port_analysis_config: &port_analysis_config
  executor:
    class: SimulatorExecutor
    module_path: qlib.backtest.executor
    kwargs:
      time_per_step: week
      generate_portfolio_metrics: true
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 20
      n_drop: 5
  backtest:
    start_time: 2023-01-01
    end_time: 2026-06-30
    account: 700
    benchmark: SPY
    exchange_kwargs:
      deal_price: close
      open_cost: 0.0023            # Phase 0 실측 비용(베이스라인과 동일)
      close_cost: 0.0023
      min_cost: 0
      trade_unit: null

task:
  model:
    class: GRU
    module_path: qlib.contrib.model.pytorch_gru
    kwargs:
      d_feat: 6                    # Alpha360 = 6필드(OHLCV+VWAP) × 60일 시퀀스
      hidden_size: 64
      num_layers: 2
      dropout: 0.0
      n_epochs: 20                 # 싱글스레드 CPU(OMP_NUM_THREADS=1) 시간 고려, early_stop 10
      lr: 0.001
      early_stop: 10
      batch_size: 2000
      metric: loss
      loss: mse
      n_jobs: 8
      GPU: 0                       # CUDA 없으면 자동 CPU 폴백
      seed: 2026
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha360
        module_path: qlib.contrib.data.handler
        kwargs: *data_handler_config
      segments:
        train: [2015-01-02, 2021-06-30]
        valid: [2021-07-01, 2022-12-31]
        test:  [2023-01-01, 2026-07-16]
