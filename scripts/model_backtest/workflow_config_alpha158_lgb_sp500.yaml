# Phase 3 ② — Alpha158 + LightGBM, S&P500 전체 확장 (실제 엣지 판독)
#
# ①(41종목 배선 스모크)에서 검증된 config를 유니버스만 S&P500 전체(~503)로 확장.
# 이제 횡단 랭킹이 유의미 → IC/RankIC/IR로 실제 엣지 판독. Sharpe 4+면 과최적 의심.
#
# grilling 결정(B3): 유니버스 sp500(SPY 제외, 매매 전용), 벤치마크 = SPY.
#   - instruments/sp500.txt = all.txt(전체+SPY) - SPY. 러너(run_smoke.py)가 생성.
#   - SPY는 features에는 있으나 매매 유니버스에서 제외 → 벤치 전용.
# 한계: 생존편향/point-in-time(개선3) — 현 S&P500 구성 고정, 과거 시점 구성 아님.
#       overlapping 라벨(B2) — 일간샘플+5일fwd. 비용은 개선2 placeholder(Phase 0 실측 대기).

qlib_init:
  provider_uri: data/qlib_us
  region: us

market: sp500
benchmark: SPY

data_handler_config: &data_handler_config
  start_time: 2015-01-02
  end_time: 2026-07-16
  fit_start_time: 2015-01-02   # 정규화 통계는 train 구간만 (valid/test 누설 방지)
  fit_end_time: 2021-06-30
  instruments: sp500           # SPY 제외 매매 유니버스 (러너가 all.txt에서 생성)
  # B2: 주간 5거래일 fwd 라벨 override.
  label: [["Ref($close, -6)/Ref($close, -1) - 1"], ["LABEL0"]]
  infer_processors:
    - class: RobustZScoreNorm
      kwargs: {fields_group: feature, clip_outlier: true}
    - class: Fillna
      kwargs: {fields_group: feature}
  learn_processors:
    - class: DropnaLabel
    - class: CSRankNorm
      kwargs: {fields_group: label}

port_analysis_config: &port_analysis_config
  executor:
    class: SimulatorExecutor
    module_path: qlib.backtest.executor
    kwargs:
      time_per_step: week          # B2: 주간 리밸런싱 스텝
      generate_portfolio_metrics: true
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 20                     # K=15~20 (이제 503 유니버스라 랭킹 유의미)
      n_drop: 5                    # 회전율 제어(개선7)
  backtest:
    start_time: 2023-01-01
    # end_time 버퍼(달력 끝-2주): TopkDropout이 최종 스텝의 다음 거래일 참조 → 오버플로 방지
    end_time: 2026-06-30
    account: 700                   # 실규모 미러 ($700). granularity/최소주문 미반영은 한계(낙관 편향)
    benchmark: SPY                 # B3: SPY 대비 초과수익·IR
    exchange_kwargs:
      deal_price: close
      # 개선2 placeholder 비용(편도 0.40% = 수수료0.10%+환전0.20%+슬리피지0.10%). ⚠️ 실측 아님.
      open_cost: 0.004
      close_cost: 0.004
      min_cost: 0                  # 소수점(fractional)
      trade_unit: null             # 소수점 매수 → 라운드랏 없음

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.0421
      subsample: 0.8789
      lambda_l1: 205.6999
      lambda_l2: 580.9768
      max_depth: 8
      num_leaves: 210
      num_threads: 8
      seed: 2026                   # 시드 고정(재현성)
      early_stopping_rounds: 50    # valid로 early-stop
      num_boost_round: 1000
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs: *data_handler_config
      segments:
        train: [2015-01-02, 2021-06-30]   # ~56%
        valid: [2021-07-01, 2022-12-31]   # ~13% (early-stop)
        test:  [2023-01-01, 2026-07-16]   # ~30% (1회만 관측)
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        model: <MODEL>
        dataset: <DATASET>
    - class: SigAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        ana_long_short: false
        ann_scaler: 52             # 주간 → 연 52주
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
